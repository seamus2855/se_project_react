<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React</title>
    <style>
      /* Custom focus-visible styles */
      input:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
      label { display: block; font-size: 0.875rem; font-weight: 500; color: #334155; margin-bottom: 0.5rem; }
      input[type="text"], input[type="email"], input[type="password"], textarea { 
        width: 100%; padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; transition: all 0.2s; 
      }
    </style>
  </head>
  <body class="bg-slate-50 antialiased text-slate-900 p-8">
    
    <!-- 1. ADD THIS: React needs this div to render your App -->
    <div id="root"></div>

    <!-- Your testing HTML can stay here, but React will render into the #root div above -->

      <h1 class="text-2xl font-bold mb-4">Account Setup</h1>
      <div class="space-y-4">
        <div>
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe">
        </div>
        <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition">
          Save Changes
        </button>
      </div>
    </div>
